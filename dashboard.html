<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Finanças do Lar</title>
  <link rel="stylesheet" href="css/style.css">
   <link rel="manifest" href="/forttifinancas/manifest.json">
  <meta name="theme-color" content="#1a1a2e">
</head>
<body>
  <div class="app-container">
    <div class="balance-card">
      <p>Saldo Atual da Casa</p>
      <h1 id="totalBalance">R$ 0,00</h1>
    </div>

    <div class="resumo-grid">
      <div class="resumo-card receita">
        <small>Total Receitas</small>
        <h3 id="dashReceitas">R$ 0,00</h3>
      </div>
      <div class="resumo-card despesa">
        <small>Total Despesas</small>
        <h3 id="dashDespesas">R$ 0,00</h3>
      </div>
    </div>

    <p class="section-title">Histórico Recente</p>
    <ul class="history-list" id="historyList">
      <!-- Preenchido via JavaScript -->
    </ul>

    <nav class="nav-bottom">
      <a href="dashboard.html" class="active">📊 Início</a>
      <a href="relatorios.html">📅 Mensal</a>
      <a href="lancamento.html">➕ Novo</a>
      <a href="#" id="logoutBtn">❌ Sair</a>
    </nav>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
