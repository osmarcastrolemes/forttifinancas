<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Finanças da Casa</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <h2>Criar Conta</h2>
    <form id="cadastroForm">
      <div class="input-group">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" required placeholder="Seu Nome">
      </div>
      <div class="input-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" required placeholder="seuemail@casa.com">
      </div>
      <div class="input-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" required placeholder="Crie uma senha">
      </div>
      <button type="submit">Cadastrar</button>
    </form>
    <div class="link-alt">
      Já tem conta? <a href="index.html">Faça Login</a>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
