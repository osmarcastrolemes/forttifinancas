<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Finanças do Lar</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-wrapper">
    <main class="app-container login-container">
      <header class="app-header">
        <div class="app-logo">🏠</div>
        <h2>Criar Conta</h2>
        <p>Preencha os dados para começar</p>
      </header>
      <form id="cadastroForm">
        <div class="input-group">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" required placeholder="Seu Nome" autocomplete="name">
        </div>
        <div class="input-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" required placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="input-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" required placeholder="Crie uma senha" autocomplete="new-password">
        </div>
        <button type="submit">Cadastrar</button>
      </form>
      <div class="link-alt">
        Já tem conta? <a href="index.html">Faça Login</a>
      </div>
    </main>
    <footer class="app-footer">
      <p>Desenvolvido por <strong>Fortti - Osmar de Castro Lemes</strong></p>
    </footer>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
