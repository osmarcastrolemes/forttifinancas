<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acompanhamento Mensal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <h2>Acompanhamento Mensal</h2>

    <!-- Seletor de Mês -->
    <div class="input-group">
      <label for="filtroMesRelatorio">Escolha o Mês para Análise:</label>
      <select id="filtroMesRelatorio">
        <!-- Preenchido via JS -->
      </select>
    </div>

    <!-- Cards de Resumo do Mês -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;">
      <div style="background: #e8f5e9; padding: 12px; border-radius: 8px; text-align: center;">
        <small style="color: #2e7d32; font-weight: bold;">Total Receitas</small>
        <h3 id="resumoReceitas" style="color: #2e7d32; margin-top: 4px;">R$ 0,00</h3>
      </div>
      <div style="background: #ffebee; padding: 12px; border-radius: 8px; text-align: center;">
        <small style="color: #c62828; font-weight: bold;">Total Despesas</small>
        <h3 id="resumoDespesas" style="color: #c62828; margin-top: 4px;">R$ 0,00</h3>
      </div>
    </div>

    <div class="balance-card" id="cardSaldoMensal" style="padding: 15px; margin-bottom: 20px;">
      <p>Balanço do Mês Selecionado</p>
      <h2 id="saldoMensal" style="color: white; margin: 5px 0 0 0;">R$ 0,00</h2>
    </div>

    <h3>Lançamentos do Período</h3>
    <ul class="history-list" id="listaRelatorioMes">
      <!-- Preenchido via JS -->
    </ul>

    <nav class="nav-bottom">
      <a href="dashboard.html">📊 Início</a>
      <a href="relatorios.html" style="color: var(--primary); font-weight: bold;">📅 Mensal</a>
      <a href="lancamento.html">➕ Novo Gasto</a>
      <a href="#" id="logoutBtn3">❌ Sair</a>
    </nav>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
