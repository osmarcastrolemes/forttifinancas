<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acompanhamento Mensal - Finanças do Lar</title>
  <link rel="stylesheet" href="css/style.css">
   <link rel="manifest" href="/forttifinancas/manifest.json">
  <meta name="theme-color" content="#1a1a2e">
</head>
<body>
  <div class="app-container">
    <h2>Acompanhamento Mensal</h2>

    <div class="input-group">
      <label for="filtroMesRelatorio">Escolha o Mês para Análise:</label>
      <select id="filtroMesRelatorio">
        <!-- Preenchido via JS -->
      </select>
    </div>

    <div class="resumo-grid">
      <div class="resumo-card receita">
        <small>Total Receitas</small>
        <h3 id="resumoReceitas">R$ 0,00</h3>
      </div>
      <div class="resumo-card despesa">
        <small>Total Despesas</small>
        <h3 id="resumoDespesas">R$ 0,00</h3>
      </div>
    </div>

    <div class="balance-card" id="cardSaldoMensal">
      <p>Balanço do Mês Selecionado</p>
      <h2 id="saldoMensal">R$ 0,00</h2>
    </div>

    <p class="section-title">Lançamentos do Período</p>
    <ul class="history-list" id="listaRelatorioMes">
      <!-- Preenchido via JS -->
    </ul>

    <nav class="nav-bottom">
      <a href="dashboard.html">📊 Início</a>
      <a href="relatorios.html" class="active">📅 Mensal</a>
      <a href="lancamento.html">➕ Novo</a>
      <a href="#" id="logoutBtn3">❌ Sair</a>
    </nav>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
