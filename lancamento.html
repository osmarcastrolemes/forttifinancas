<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Lançamento - Finanças do Lar</title>
  <link rel="stylesheet" href="css/style.css">
   <link rel="manifest" href="/forttifinancas/manifest.json">
  <meta name="theme-color" content="#1a1a2e">
</head>
<body>
  <div class="app-container">
    <h2>Novo Lançamento</h2>
    <form id="lancamentoForm">
      <div class="input-group">
        <label for="tipo">Tipo</label>
        <select id="tipo" required>
          <option value="despesa">Despesa (Saída)</option>
          <option value="receita">Receita (Entrada)</option>
        </select>
      </div>
      <div class="input-group">
        <label for="valor">Valor (R$)</label>
        <input type="number" id="valor" step="0.01" required placeholder="0,00">
      </div>
      <div class="input-group">
        <label for="categoria">Categoria</label>
        <select id="categoria" required>
          <!-- Carregado do banco via JavaScript -->
        </select>
      </div>
      <div class="input-group">
        <label for="data">Data</label>
        <input type="date" id="data" required>
      </div>
      <div class="input-group">
        <label for="descricao">Descrição (Opcional)</label>
        <input type="text" id="descricao" placeholder="Ex: Compras do mês">
      </div>
      <button type="submit">Salvar Registro</button>
    </form>

    <nav class="nav-bottom">
      <a href="dashboard.html">📊 Início</a>
      <a href="relatorios.html">📅 Mensal</a>
      <a href="lancamento.html" class="active">➕ Novo</a>
      <a href="#" id="logoutBtn">❌ Sair</a>
    </nav>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
