<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Finanças da Casa</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <h2>Finanças da Casa</h2>
    <form id="loginForm">
      <div class="input-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" required placeholder="seuemail@casa.com">
      </div>
      <div class="input-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" required placeholder="••••••••">
      </div>
      <button type="submit">Entrar</button>
    </form>
    <div class="link-alt">
      Não tem conta? <a href="cadastro.html">Cadastre-se aqui</a>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
