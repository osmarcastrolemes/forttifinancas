<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Finanças do Lar</title>
  <!-- Link para ícones modernos nos inputs -->
  <link rel="stylesheet" href="https://googleapis.com">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main class="app-container">
    <header class="app-header">
      <h2>Finanças do Lar</h2>
      <p>Gerencie o orçamento da sua casa de forma simples</p>
    </header>

    <form id="loginForm" novalidate>
      <div class="input-group">
        <label for="email">E-mail</label>
        <div class="input-with-icon">
          <span class="material-symbols-outlined">mail</span>
          <input type="email" id="email" required placeholder="seuemail@lar.com" autocomplete="email">
        </div>
      </div>

      <div class="input-group">
        <label for="senha">Senha</label>
        <div class="input-with-icon">
          <span class="material-symbols-outlined">lock</span>
          <input type="password" id="senha" required placeholder="••••••••" autocomplete="current-password">
        </div>
      </div>

      <button type="submit" class="btn-submit">Entrar</button>
    </form>

    <div class="link-alt">
      <span>Não tem conta?</span> 
      <a href="cadastro.html">Cadastre-se aqui</a>
    </div>
  </main>

  <footer class="app-footer">
    <p>Desenvolvido por <strong>Fortti - Osmar de Castro Lemes</strong></p>
  </footer>

  <script src="js/auth.js"></script>
</body>
</html>
