<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Finanças do Lar</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-wrapper">
    <main class="app-container login-container">
      <header class="app-header">
        <div class="app-logo">🏠</div>
        <h2>Finanças do Lar</h2>
        <p>Gerencie o orçamento da sua casa de forma simples</p>
      </header>
      <form id="loginForm">
        <div class="input-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" required placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="input-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" required placeholder="••••••" autocomplete="current-password">
        </div>
        <button type="submit" class="btn-submit">Entrar</button>
      </form>
      <div class="link-alt">
        Não tem conta? <a href="cadastro.html">Cadastre-se aqui</a>
      </div>
    </main>
    <footer class="app-footer">
      <p>Desenvolvido por <strong>Fortti - Osmar de Castro Lemes</strong></p>
    </footer>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
